sistema:
  nome: "Boletim 100"
  instituicao: "IAC"
  estado: "SP"
  metodo_calagem: "Saturação por bases"
parametros:
  unidade_ctc: "mmolc/dm3"
  unidade_ca_mg: "mmolc/dm3"
  prnt_padrao: 80
v_alvo:
  milho:
    minimo: 60
    ideal: 70
formula:
  nome: "Saturação por bases (Boletim 100 - 2022)"
  expressao: "NC = (CTC * (V2 - V1)) / (10 * PRNT)"
  unidades:
    CTC: "mmolc/dm3"
    V1: "%"
    V2: "%"
    PRNT: "%"
    NC: "t/ha"
regras:
  aplicar_se:
    v_atual_menor_que: 60

  nao_aplicar_se:
    v_atual_maior_ou_igual: 70
limites:
  dose_maxima_t_ha: 5.0
  dose_minima_t_ha: 0.5
observacoes:
  - "Aplicar preferencialmente 90 dias antes do plantio"
  - "Incorporar até 20 cm quando possível"
  - "PRNT deve ser informado pelo usuário se diferente do padrão"
