nitrogenio:
  # ======================
  # Identidade
  # ======================

  nutriente: N
  nutriente_recomendado: N
  unidade_saida: kg/ha

  fonte_referencia:
    documento: "Boletim 100"
    instituicao: "IAC"
    ano: 2022

  regras:

    # ======================
    # Produtividade <6
    # ======================

    - condicoes: { produtividade: "0 <= produtividade <45", classe_resp_N: "media_baixa" }
      recomendacao: 60

    - condicoes: { produtividade: "0 <= produtividade <45", classe_resp_N: "alto" }
      recomendacao: 90

    # ======================
    # Produtividade 6–8
    # ======================

    - condicoes: { produtividade: "45 <= produtividade < 55", classe_resp_N: "media_baixa" }
      recomendacao: 90

    - condicoes: { produtividade: "45 <= produtividade < 55", classe_resp_N: "alto" }
      recomendacao: 120

    # ======================
    # Produtividade 8–10
    # ======================

    - condicoes: { produtividade: "55 <= produtividade < 60", classe_resp_N: "media_baixa" }
      recomendacao: 120

    - condicoes: { produtividade: "55 <= produtividade < 60", classe_resp_N: "alto" }
      recomendacao: 160

    # ======================
    # Produtividade 10–12
    # ======================

    - condicoes: { produtividade: "60 <= produtividade < 65", classe_resp_N: "media_baixa" }
      recomendacao: 140

    - condicoes: { produtividade: "60 <= produtividade < 65", classe_resp_N: "alto" }
      recomendacao: 200


    # ======================
    # Produtividade >12
    # ======================

    - condicoes: { produtividade: ">65", classe_resp_N: "media_baixa" }
      recomendacao: 160

    - condicoes: { produtividade: ">65", classe_resp_N: "alto" }
      recomendacao: 220
