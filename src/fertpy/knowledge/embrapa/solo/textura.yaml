sistema: EMBRAPA
descricao: >
  Classificação textural do solo baseada no Triângulo Textural Oficial
  adotado pela EMBRAPA, utilizando percentuais de areia, silte e argila.
  A soma das frações deve ser igual a 100%.

regras_gerais:
  soma_percentuais: 100
  tolerancia: 0.5  # tolerância numérica para soma (ex: 99.8–100.2)

texturas:

  areia:
    areia: { min: 85 }
    argila: { max: 10 }

  areia_franca:
    areia: { min: 70, max: 85 }
    argila: { max: 15 }

  franco_arenosa:
    areia: { min: 52, max: 70 }
    argila: { min: 7, max: 20 }

  franca:
    areia: { min: 23, max: 52 }
    silte: { min: 28, max: 50 }
    argila: { min: 7, max: 27 }

  franco_siltosa:
    silte: { min: 50, max: 80 }
    argila: { min: 7, max: 27 }

  siltosa:
    silte: { min: 80 }
    argila: { max: 12 }

  franco_argilosa:
    argila: { min: 27, max: 40 }
    areia: { min: 20, max: 45 }

  argilo_arenosa:
    argila: { min: 35, max: 55 }
    areia: { min: 45 }

  argilo_siltosa:
    argila: { min: 40, max: 60 }
    silte: { min: 40 }

  argilosa:
    argila: { min: 40 }
